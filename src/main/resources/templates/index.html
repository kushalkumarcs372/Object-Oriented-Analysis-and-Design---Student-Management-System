<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <title>Student Management System</title>
    <link rel="stylesheet" th:href="@{/style.css}">
</head>

<body>

<div class="container">

    <h1>🎓 Student Management System</h1>

    <div class="card">

        <h2>Register Student</h2>

        <form th:action="@{/api/students}" th:object="${student}" method="post">

            <div class="input-group">
                <label>Name</label>
                <input type="text" th:field="*{name}" placeholder="Enter student name" required>
            </div>

            <div class="input-group">
                <label>Email</label>
                <input type="email" th:field="*{email}" placeholder="Enter email address" required>
            </div>

            <div class="input-group">
                <label>Course</label>
                <input type="text" th:field="*{course}" placeholder="Enter course name" required>
            </div>

            <button type="submit">Register Student</button>

        </form>

    </div>

    <div class="card">

        <h2>Student List</h2>

        <table>

            <thead>
            <tr>
                <th>ID</th>
                <th>Name</th>
                <th>Email</th>
                <th>Course</th>
            </tr>
            </thead>

            <tbody>

            <tr th:each="s : ${students}">
                <td th:text="${s.id}"></td>
                <td th:text="${s.name}"></td>
                <td th:text="${s.email}"></td>
                <td th:text="${s.course}"></td>
            </tr>

            </tbody>

        </table>

    </div>

</div>

</body>
</html>
